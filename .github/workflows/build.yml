name: Build & Deploy

on:
  schedule:
    # 21:00 UTC = 06:00 JST next day
    - cron: "0 21 * * *"
  workflow_dispatch:              # manual trigger from the Actions tab
  push:                           # auto-run when code changes
    branches: [main]
    paths:
      - "**.py"
      - ".github/workflows/*.yml"
      - "requirements.txt"
      - "config.yaml"
      - "manifest.json"
      - "service-worker.js"
      - "icons/**"

permissions:
  contents: write                 # to commit dist/ + state/ back to the repo

concurrency:
  group: paper-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull dismissed log from Google Drive
        env:
          GDRIVE_CLIENT_ID:     ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: |
          if [ -n "$GDRIVE_REFRESH_TOKEN" ]; then
            python gdrive_sync.py pull
          else
            echo "GDRIVE_REFRESH_TOKEN not set; starting with empty dismissed set"
            echo "{}" > dismissed.json
          fi

      - name: Fetch papers
        env:
          PAPER_ROOT:        ${{ github.workspace }}/state
          PAPER_PUBLIC_ROOT: ${{ github.workspace }}/dist
        run: python fetch.py

      - name: Render (LLM via Groq)
        env:
          PAPER_ROOT:        ${{ github.workspace }}/state
          PAPER_PUBLIC_ROOT: ${{ github.workspace }}/dist
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER:      groq
          LLM_MODEL:         llama-3.3-70b-versatile
          GDRIVE_CLIENT_ID:  ${{ secrets.GDRIVE_CLIENT_ID }}
          STATIC_BUILD:      "1"
        run: python render.py

      - name: Copy PWA static assets into dist/
        run: |
          mkdir -p dist/icons
          cp manifest.json service-worker.js dist/
          cp -r icons/. dist/icons/

      - name: Prune bulky PDFs from state before commit
        run: |
          rm -rf state/data/pdfs
          # figures live in dist/ (public); state keeps only the DB
          find state -maxdepth 4 -type d -empty -delete || true
          du -sh state dist || true

      - name: Upload Pages artifact (fresh dist/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Commit results
        run: |
          set -x
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Snapshot the freshly-built outputs so we can survive any git reset.
          echo "=== dist size before snapshot ==="; du -sh dist state
          tar czf /tmp/outputs.tgz dist state
          ls -la /tmp/outputs.tgz

          # Force LF for the SQLite DB so autocrlf doesn't muck with it.
          echo "state/data/papers.db binary" > .gitattributes

          for attempt in 1 2 3 4 5; do
            echo "=== attempt $attempt ==="
            git fetch origin main
            git reset --hard origin/main
            # Restore our freshly-built outputs on top of remote HEAD
            tar xzf /tmp/outputs.tgz
            # Ensure the marker file is present too (harmless if unchanged)
            echo "state/data/papers.db binary" > .gitattributes
            git add -A dist state .gitattributes
            git status --short
            if git diff --cached --quiet; then
              echo "no changes vs origin/main after re-apply"
              exit 0
            fi
            git commit -m "build: $(date -u +%Y-%m-%dT%H:%MZ) [attempt $attempt]"
            if git push origin HEAD:main; then
              echo "pushed (attempt $attempt)"
              exit 0
            fi
            sleep $((attempt * 3))
          done
          echo "push failed after retries"
          exit 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages:    write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Deploy the artifact that BUILD just uploaded, not a fresh checkout.
      # (Checkout of the trigger commit would deploy stale dist/.)
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          # Pages CDN sometimes 500s on the first try; deploy-pages retries
          # internally up to error_count times.
          error_count: 10
          timeout: 600000

