fetch:
  arxiv_categories:
    - cs.HC
    - cs.GR
    - cs.LG
    - cs.AI
    - cs.CL
    - cs.CV
    - cs.SD
    - eess.AS
    - cs.MM
  arxiv_max_results: 80
  crossref_acm_member: 320
  crossref_days_back: 5
  crossref_rows: 200

interests:
  VR_XR_HCI:
    weight: 1.0
    keywords: [vr, xr, virtual reality, augmented reality, mixed reality,
               immersive, hci, human-computer interaction, gesture, haptic,
               passthrough, head-mounted, wearable]
  BCI_BMI:
    weight: 1.2
    keywords: [bci, bmi, brain-computer, brain-machine, eeg, neural interface,
               neurofeedback, ecog, fnirs, p300, ssvep, motor imagery]
  ML_GenAI:
    weight: 0.8
    keywords: [diffusion, latent diffusion, transformer, llm, language model,
               generative model, gan, vae, flow matching, text-to-image,
               text-to-video, text-to-3d, multimodal]
  Music_Art:
    weight: 1.0
    keywords: [music generation, audio synthesis, audio generation, melody,
               sound design, generative art, neural rendering, nerf,
               gaussian splatting, score-based, motion synthesis]

# Methods/tech-stack vocabulary for badge extraction.
# Matched as whole-word case-insensitive against title + tldr + abstract.
methods:
