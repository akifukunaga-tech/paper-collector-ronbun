  - diffusion
  - latent diffusion
  - score-based
  - flow matching
  - gan
  - vae
  - normalizing flow
  - u-net
  - resnet
  - vit
  - clip
  - sam
  - dino
  - nerf
  - gaussian splatting
  - graph neural network
  - gnn
  - reinforcement learning
  - rlhf
  - dpo
  - contrastive learning
  - self-supervised
  - few-shot
  - zero-shot
  - meta-learning
  - in-context learning
  - chain-of-thought
  - retrieval-augmented
  - rag
  - llm
  - large language model
  - instruction tuning
  - fine-tuning
  - lora
  - prompt tuning
  - mixture of experts
