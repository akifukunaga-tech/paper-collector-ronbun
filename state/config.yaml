# Composite-score weights. Citation/recency removed - too noisy for fresh papers.
score_weights:
  keyword: 1.0       # per-interest keyword matches in title + tldr + abstract
  novelty: 0.3       # multiplier from "we propose / novel / first / sota" signal words

# How many top-keyword candidates to enrich via Semantic Scholar before final ranking.
candidate_pool: 80

# LLM for high-quality 1-sentence summaries + structured method extraction.
# provider = ollama (local) | groq (cloud, free) | claude (cloud, paid)
# API keys for cloud providers come from env vars: GROQ_API_KEY, ANTHROPIC_API_KEY
llm:
  enabled: true
  provider: ollama                       # switch to "groq" for cloud deployment
  model: gemma4:e2b                      # ollama:gemma4:e2b / groq:gemma2-9b-it / claude:claude-haiku-4-5-20251001
  ollama_url: http://localhost:11434     # ignored unless provider=ollama
  timeout_seconds: 120
  language: ja                           # ja or en

display:
  papers_per_day: 10
  oa_only: true
  email: aki.fukunaga01@gmail.com

# Google Drive dismiss-log sync (optional). Leave client_id blank to disable
# the sync button on the PWA. Set via env GDRIVE_CLIENT_ID in GitHub Actions.
gdrive:
  client_id: ""

# Image compression for mobile-friendly payload.
# Full-resolution originals are kept in data/figures/; served files are the compressed .thumb.jpg.
images:
  hero_max_px: 900
  hero_quality: 80
  more_max_px: 400
  more_quality: 75

# Server auth. Leave password empty to disable (localhost use only).
# When set, HTTP Basic auth is required for every request. Use a strong password
# if you expose this via cloudflared / ngrok.
server:
  auth:
    username: aki
    password: ""
